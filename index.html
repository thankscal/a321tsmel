<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A321neo 病急亂投醫 — ECAM Quick Reference</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;500;600;700&family=Noto+Sans+TC:wght@300;400;500;700&display=swap');

:root {
  --bg:#080b0e;--panel:#0d1218;--panel2:#121820;--border:#1e2a38;--border-bright:#2a3f58;
  --amber:#f5a623;--amber-dim:#8a5d12;--green:#4ddd65;--green-dim:#1a6030;--red:#f06060;
  --blue:#60c8ff;--blue-dim:#1a4a70;--text:#d8e8f8;--text-dim:#7090b0;--text-bright:#f0f8ff;
  --accent:#f5a623;--warning-bg:#1a1200;--caution-bg:#0a1520;
  --mel-bg:#0d1520;--mel-border:#1e3050;
}
body.day-mode {
  --bg:#f0f2f5;--panel:#ffffff;--panel2:#f5f7fa;--border:#d0d8e4;--border-bright:#b0bcd0;
  --amber:#c47800;--amber-dim:#e8b040;--green:#1a7a30;--green-dim:#2aa048;--red:#c03030;
  --blue:#1a6ab8;--blue-dim:#5090d0;--text:#2a3a4a;--text-dim:#7a8a9a;--text-bright:#0a1828;
  --accent:#c47800;--warning-bg:#fff8e0;--caution-bg:#e8f2ff;--mel-bg:#eef4ff;--mel-border:#b0c8e8;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Noto Sans TC', 'Rajdhani', sans-serif;
  min-height: 100vh;
  overflow-x: hidden;
}

/* SCANLINE OVERLAY */
body::before {
  content: '';
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: repeating-linear-gradient(
    0deg,
    transparent,
    transparent 2px,
    rgba(0,0,0,0.07) 2px,
    rgba(0,0,0,0.07) 4px
  );
  pointer-events: none;
  z-index: 9999;
}

/* TOP HEADER */
.header {
  background: var(--panel);
  border-bottom: 1px solid var(--border-bright);
  padding: 12px 20px;
  display: flex;
  align-items: center;
  gap: 16px; flex-wrap:wrap;
  position: sticky; top: 0; z-index: 100;
}

.header-logo {
  font-family: 'Share Tech Mono', monospace;
  font-size: calc(11px * var(--ui-scale));
  color: var(--amber);
  letter-spacing: 2px;
  text-transform: uppercase;
  white-space: nowrap;
}

.header-title {
  font-family: 'Rajdhani', sans-serif;
  font-weight: 700;
  font-size: calc(20px * var(--ui-scale));
  color: var(--text-bright);
  letter-spacing: 3px;
  text-transform: uppercase;
}

.header-sub {
  font-family: 'Share Tech Mono', monospace;
  font-size: calc(10px * var(--ui-scale));
  color: var(--text-dim);
  letter-spacing: 1px;
  flex: 1;
}

.warning-badge {
  background: var(--warning-bg);
  border: 1px solid var(--amber-dim);
  color: var(--amber);
  font-family: 'Share Tech Mono', monospace;
  font-size: calc(9px * var(--ui-scale));
  padding: 4px 8px;
  letter-spacing: 1px;
  animation: blink 3s ease-in-out infinite;
}

@keyframes blink {
  0%, 90%, 100% { opacity: 1; }
  95% { opacity: 0.3; }
}

/* SEARCH BAR */
.search-bar {
  padding: 12px 20px;
  background: var(--panel);
  border-bottom: 1px solid var(--border);
  display: flex;
  gap: 10px;
  align-items: center;
}

.search-input {
  flex: 1;
  background: var(--bg);
  border: 1px solid var(--border-bright);
  color: var(--text-bright);
  font-family: 'Share Tech Mono', monospace;
  font-size: calc(13px * var(--ui-scale));
  padding: 8px 12px;
  outline: none;
  letter-spacing: 1px;
  transition: border-color 0.2s;
}

.search-input::placeholder { color: var(--text-dim); }
.search-input:focus { border-color: var(--amber); }

.search-label {
  font-family: 'Share Tech Mono', monospace;
  font-size: calc(10px * var(--ui-scale));
  color: var(--amber);
  letter-spacing: 2px;
}

/* LAYOUT */
.layout{display:flex;min-height:calc(100vh - 100px);}
.resizer{width:6px;background:var(--border);cursor:col-resize;flex-shrink:0;transition:background 0.15s;}
.resizer:hover,.resizer.dragging{background:var(--amber);}

/* SIDEBAR */
.sidebar{background:var(--panel);border-right:1px solid var(--border);overflow-y:auto;height:calc(100vh - 100px);position:sticky;top:100px;width:260px;min-width:140px;max-width:480px;flex-shrink:0;}

.sidebar-section {
  border-bottom: 1px solid var(--border);
}

.sidebar-section-header {
  padding: 10px 14px;
  font-family: 'Share Tech Mono', monospace;
  font-size: calc(9px * var(--ui-scale));
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--amber);
  background: rgba(245,166,35,0.05);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: space-between;
  user-select: none;
  transition: background 0.15s;
}

.sidebar-section-header:hover { background: rgba(245,166,35,0.1); }

.sidebar-section-header .arrow {
  transition: transform 0.2s;
  font-size: calc(8px * var(--ui-scale));
}

.sidebar-section-header.collapsed .arrow { transform: rotate(-90deg); }

.sidebar-items {
  overflow: hidden;
  transition: max-height 0.3s ease;
}

.sidebar-items.collapsed { max-height: 0; }

.sidebar-item {
  padding:8px 14px 8px 22px;
  font-size: calc(14px * var(--ui-scale));
  color: var(--text-dim);
  cursor: pointer;
  transition: all 0.15s;
  display: flex;
  align-items: center;
  gap: 8px;
  border-left: 2px solid transparent;
  font-family: 'Noto Sans TC', sans-serif;
  letter-spacing: 0.3px;
}

.sidebar-item:hover {
  color: var(--text-bright);
  background: rgba(77,184,255,0.05);
  border-left-color: var(--blue);
}

.sidebar-item.active {
  color: var(--amber);
  background: rgba(245,166,35,0.08);
  border-left-color: var(--amber);
}

.sidebar-item .dot {
  width: 4px; height: 4px;
  border-radius: 50%;
  background: currentColor;
  flex-shrink: 0;
}

/* MAIN CONTENT */
.main{overflow-y:auto;padding:20px;background:var(--bg);flex:1;min-width:0;}

/* HOME PAGE */
.home-page {
  max-width: 900px;
}

.home-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap: 1px;
  background: var(--border);
  margin-bottom: 20px;
}

.chapter-card {
  background: var(--panel);
  padding: 16px;
  cursor: pointer;
  transition: all 0.15s;
  position: relative;
  overflow: hidden;
}

.chapter-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0;
  width: 3px; height: 100%;
  background: var(--amber-dim);
  transition: background 0.15s;
}

.chapter-card:hover {
  background: var(--panel2);
}
.chapter-card:hover::before { background: var(--amber); }

.chapter-card .me-code {
  font-family: 'Share Tech Mono', monospace;
  font-size: calc(11px * var(--ui-scale));
  color: var(--amber);
  letter-spacing: 2px;
  margin-bottom: 6px;
}

.chapter-card .me-title {
  font-size: calc(13px * var(--ui-scale));
  color: var(--text);
  font-weight: 500;
  line-height: 1.3;
}

.chapter-card .me-count {
  margin-top: 8px;
  font-family: 'Share Tech Mono', monospace;
  font-size: calc(10px * var(--ui-scale));
  color: var(--text-dim);
}

/* AIRCRAFT INFO */
.ac-info-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
  gap: 12px;
  margin-bottom: 20px;
}

.ac-card {
  background: var(--panel);
  border: 1px solid var(--border);
  padding: 12px 16px;
}

.ac-card-label {
  font-family: 'Share Tech Mono', monospace;
  font-size: calc(9px * var(--ui-scale));
  color: var(--text-dim);
  letter-spacing: 2px;
  margin-bottom: 8px;
  text-transform: uppercase;
}

.ac-table {
  width: 100%;
  font-size: calc(12px * var(--ui-scale));
}

.ac-table tr td:first-child {
  color: var(--text-dim);
  font-family: 'Share Tech Mono', monospace;
  font-size: calc(11px * var(--ui-scale));
  padding-right: 12px;
  width: 80px;
  letter-spacing: 0.5px;
}

.ac-table tr td:last-child {
  color: var(--green);
  font-family: 'Share Tech Mono', monospace;
  font-size: calc(11px * var(--ui-scale));
}

.ac-table tr { border-bottom: 1px solid var(--border); }
.ac-table tr:last-child { border: none; }
.ac-table tr td { padding: 5px 0; }

/* DETAIL PAGE */
.detail-page {}

.detail-back {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  font-family: 'Share Tech Mono', monospace;
  font-size: calc(11px * var(--ui-scale));
  color: var(--text-dim);
  cursor: pointer;
  margin-bottom: 16px;
  transition: color 0.15s;
  letter-spacing: 1px;
}
.detail-back:hover { color: var(--amber); }

.detail-header {
  display: flex;
  align-items: flex-start;
  gap: 16px;
  margin-bottom: 20px;
  padding-bottom: 16px;
  border-bottom: 1px solid var(--border);
}

.detail-me-tag {
  background: var(--warning-bg);
  border: 1px solid var(--amber-dim);
  font-family: 'Share Tech Mono', monospace;
  font-size: calc(10px * var(--ui-scale));
  color: var(--amber);
  padding: 4px 8px;
  letter-spacing: 2px;
  white-space: nowrap;
  flex-shrink: 0;
}

.detail-title {
  font-family: 'Rajdhani', sans-serif;
  font-size: calc(22px * var(--ui-scale));
  font-weight: 700;
  color: var(--text-bright);
  letter-spacing: 2px;
  text-transform: uppercase;
  line-height: 1.2;
}

.detail-sub {
  font-size: calc(12px * var(--ui-scale));
  color: var(--text-dim);
  font-family: 'Share Tech Mono', monospace;
  margin-top: 4px;
  letter-spacing: 1px;
}

/* ALERT CARDS */
.alert-grid {
  display: grid;
  gap: 1px;
  background: var(--border);
}

.alert-card {
  background: var(--panel);
  transition: background 0.15s;
}

.alert-card-header {
  padding: 12px 16px;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 12px;
  transition: background 0.15s;
}

.alert-card-header:hover { background: var(--panel2); }

.alert-name {
  font-family: 'Share Tech Mono', monospace;
  font-size: calc(15px * var(--ui-scale));
  color:var(--amber);
  letter-spacing:1.5px;
  flex: 1;
}

.alert-chevron {
  color: var(--text-dim);
  font-size: calc(10px * var(--ui-scale));
  transition: transform 0.2s;
  flex-shrink: 0;
}

.alert-card.open .alert-chevron { transform: rotate(90deg); }

.alert-body {
  display: none;
  padding: 0 16px 16px;
  background: var(--panel2);
  border-top: 1px solid var(--border);
}

.alert-card.open .alert-body { display: block; }

/* SECTIONS INSIDE ALERT */
.info-section {
  margin-top: 14px;
}

.info-section-label {
  font-family: 'Share Tech Mono', monospace;
  font-size: calc(9px * var(--ui-scale));
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--blue);
  margin-bottom: 8px;
  display: flex;
  align-items: center;
  gap: 8px;
}

.info-section-label::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--border-bright);
}

.fcom-box {
  background:var(--caution-bg);
  border-left:3px solid var(--blue-dim);
  padding:10px 12px;
  font-size: calc(14px * var(--ui-scale));
  color: var(--text);
  line-height: 1.7;
  font-family: 'Noto Sans TC', sans-serif;
}

.cb-table {
  width: 100%;
  border-collapse: collapse;
  font-family: 'Share Tech Mono', monospace;
  font-size: calc(11px * var(--ui-scale));
}

.cb-table th {
  background: rgba(245,166,35,0.08);
  color: var(--amber);
  font-size: calc(9px * var(--ui-scale));
  letter-spacing: 2px;
  text-align: left;
  padding: 6px 10px;
  text-transform: uppercase;
  border-bottom: 1px solid var(--amber-dim);
}

.cb-table td {
  padding: 5px 10px;
  border-bottom: 1px solid var(--border);
  color: var(--text);
}

.cb-table td:first-child { color: var(--amber); }
.cb-table td:nth-child(3) { color: var(--green); }
.cb-table td:last-child { color: var(--blue); font-weight: 700; }

.cb-table tr:hover td { background: rgba(77,184,255,0.04); }

.cb-group-header {
  background: rgba(0,0,0,0.3);
  color: var(--text-dim);
  font-size: calc(9px * var(--ui-scale));
  letter-spacing: 2px;
  padding: 4px 10px;
  text-transform: uppercase;
  font-style: italic;
}

.test-box {
  background: rgba(57,211,83,0.05);
  border-left: 3px solid var(--green-dim);
  padding: 10px 12px;
  font-size: calc(13px * var(--ui-scale));
  color:var(--text);
  line-height:1.7;
  font-family:'Share Tech Mono', monospace;
  letter-spacing: 0.3px;
}

.eon-box {
  background: rgba(224,82,82,0.05);
  border-left: 3px solid var(--red);
  padding: 10px 12px;
  font-size: calc(13px * var(--ui-scale));
  color:var(--text);
  line-height:1.7;
  font-family:'Noto Sans TC', sans-serif;
}

.reset-box {
  background: rgba(77,184,255,0.05);
  border-left: 3px solid var(--blue-dim);
  border-top: 1px solid var(--border);
  border-right: 1px solid var(--border);
  border-bottom: 1px solid var(--border);
  padding: 10px 12px;
  font-size: calc(13px * var(--ui-scale));
  color:var(--text);
  line-height:1.9;
  font-family:'Share Tech Mono', monospace;
  letter-spacing: 0.5px;
}

.reset-box strong {
  color: var(--blue);
  font-weight: 600;
}

/* STATUS BAR */
.status-bar {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  background: var(--panel);
  border-top: 1px solid var(--border);
  padding: 4px 20px;
  display: flex;
  gap: 20px;
  font-family: 'Share Tech Mono', monospace;
  font-size: calc(10px * var(--ui-scale));
  color: var(--text-dim);
  letter-spacing: 1px;
  z-index: 100;
}

.status-item { display: flex; align-items: center; gap: 6px; }
.status-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--green);
  animation: pulse 2s ease-in-out infinite;
}

@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.3; }
}

/* SEARCH RESULTS */
.search-result-item {
  padding: 10px 14px;
  border-bottom: 1px solid var(--border);
  cursor: pointer;
  transition: background 0.15s;
  display: flex;
  align-items: center;
  gap: 10px;
}
.search-result-item:hover { background: var(--panel2); }
.search-result-item .res-name {
  font-family: 'Share Tech Mono', monospace;
  font-size: calc(12px * var(--ui-scale));
  color: var(--amber);
  letter-spacing: 1px;
}
.search-result-item .res-chapter {
  font-size: calc(11px * var(--ui-scale));
  color: var(--text-dim);
  margin-top: 2px;
  font-family: 'Noto Sans TC', sans-serif;
}
.res-badge {
  font-family: 'Share Tech Mono', monospace;
  font-size: calc(9px * var(--ui-scale));
  background: rgba(245,166,35,0.1);
  border: 1px solid var(--amber-dim);
  color: var(--amber);
  padding: 2px 6px;
  letter-spacing: 1px;
  flex-shrink: 0;
}

.page { display: none; }
.page.active { display: block; }

/* WATER LEVEL TABLE */
.water-table {
  border-collapse: collapse;
  font-family: 'Share Tech Mono', monospace;
  font-size: calc(12px * var(--ui-scale));
}
.water-table td { padding: 6px 16px; border: 1px solid var(--border); }
.water-table td:first-child { color: var(--amber); }
.water-table td:last-child { color: var(--green); }

/* HIGHLIGHT */
.highlight { color: var(--amber); font-weight: 600; }

/* Scrollbar */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--border-bright); }
::-webkit-scrollbar-thumb:hover { background: var(--amber-dim); }

.no-cb {
  font-family: 'Share Tech Mono', monospace;
  font-size: calc(11px * var(--ui-scale));
  color: var(--text-dim);
  font-style: italic;
  padding: 6px 0;
}

.tag-warning {
  display: inline-block;
  background: rgba(224,82,82,0.12);
  border: 1px solid var(--red);
  color: var(--red);
  font-family: 'Share Tech Mono', monospace;
  font-size: calc(9px * var(--ui-scale));
  padding: 2px 6px;
  letter-spacing: 1px;
  margin-right: 4px;
}

.search-empty {
  padding: 40px;
  text-align: center;
  font-family: 'Share Tech Mono', monospace;
  font-size: calc(12px * var(--ui-scale));
  color: var(--text-dim);
  letter-spacing: 2px;
}

.mel-section{margin-top:14px;border:1px solid var(--mel-border);background:var(--mel-bg);}
.mel-section-title{font-family:'Share Tech Mono',monospace;font-size: calc(11px * var(--ui-scale));letter-spacing:3px;text-transform:uppercase;color:var(--blue);padding:8px 12px;background:rgba(77,184,255,0.08);border-bottom:1px solid var(--mel-border);display:flex;align-items:center;gap:8px;}
.mel-section-title::after{content:'';flex:1;height:1px;background:var(--mel-border);}
.mel-entries-box{padding:10px 12px;border-bottom:1px solid var(--mel-border);}
.mel-entries-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.mel-entries-col-header{font-family:'Share Tech Mono',monospace;font-size: calc(10px * var(--ui-scale));letter-spacing:2px;color:var(--amber);text-transform:uppercase;padding-bottom:4px;border-bottom:1px solid var(--mel-border);margin-bottom:6px;}
.mel-entries-val{font-size: calc(13px * var(--ui-scale));color:var(--text);font-family:'Noto Sans TC',sans-serif;line-height:1.6;}
.mel-item-box{padding:10px 12px;}
.mel-item-header{font-family:'Share Tech Mono',monospace;font-size: calc(14px * var(--ui-scale));color:var(--amber);letter-spacing:1px;font-weight:700;margin-bottom:3px;}
.mel-item-ident{font-family:'Share Tech Mono',monospace;font-size: calc(10px * var(--ui-scale));color:var(--text-dim);margin-bottom:10px;}
.mel-sub-item{border:1px solid var(--mel-border);margin-bottom:10px;background:var(--panel);}
.mel-sub-item-header{background:rgba(245,166,35,0.07);padding:6px 10px;font-family:'Share Tech Mono',monospace;font-size: calc(12px * var(--ui-scale));color:var(--amber);letter-spacing:1px;border-bottom:1px solid var(--mel-border);}
.mel-dispatch-table{width:100%;border-collapse:collapse;font-family:'Share Tech Mono',monospace;font-size: calc(12px * var(--ui-scale));margin-bottom:8px;}
.mel-dispatch-table th{background:rgba(77,184,255,0.05);color:var(--blue);font-size: calc(10px * var(--ui-scale));letter-spacing:1.5px;text-align:center;padding:5px 8px;border:1px solid var(--mel-border);text-transform:uppercase;}
.mel-dispatch-table td{text-align:center;padding:5px 8px;border:1px solid var(--mel-border);color:var(--text-bright);}
.mel-dispatch-table td.interval{color:var(--amber);font-weight:700;font-size: calc(15px * var(--ui-scale));}
.mel-conditions{padding:8px 10px;font-size: calc(13px * var(--ui-scale));color:var(--text);font-family:'Noto Sans TC',sans-serif;line-height:1.8;}
.mel-conditions .cond-item{display:block;margin-bottom:3px;}
.mel-note{font-size: calc(12px * var(--ui-scale));color:var(--amber);background:rgba(245,166,35,0.06);border-left:3px solid var(--amber-dim);padding:5px 10px;margin-top:6px;}
.mel-ref-line{font-family:'Share Tech Mono',monospace;font-size: calc(11px * var(--ui-scale));color:var(--text-dim);padding:4px 10px;border-top:1px solid var(--mel-border);background:rgba(0,0,0,0.1);}
.mel-ref-line span{color:var(--blue);}
.day-toggle{font-family:'Share Tech Mono',monospace;font-size: calc(11px * var(--ui-scale));background:rgba(77,184,255,0.1);border:1px solid var(--border-bright);color:var(--blue);padding:5px 12px;cursor:pointer;letter-spacing:1px;transition:all 0.2s;white-space:nowrap;margin-left:auto;}
.day-toggle:hover{background:rgba(77,184,255,0.2);border-color:var(--blue);}

/* ─── CB LIST / PANEL ─────────────────────────────────────── */
.cb-page-header {
  font-family: 'Share Tech Mono', monospace;
  font-size: calc(12px * var(--ui-scale));
  letter-spacing: 2px;
  color: var(--text-dim);
  padding: 8px 14px;
  background: var(--panel);
  border-bottom: 1px solid var(--border);
  text-transform: uppercase;
}
.cb-panel-tabs {
  display: flex;
  flex-wrap: wrap;
  gap: 4px;
  padding: 10px 14px;
  background: var(--panel);
  border-bottom: 1px solid var(--border);
  position: sticky;
  top: 0;
  z-index: 10;
}
.cb-panel-tab {
  font-family: 'Share Tech Mono', monospace;
  font-size: calc(11px * var(--ui-scale));
  padding: 4px 10px;
  background: var(--bg);
  border: 1px solid var(--border-bright);
  color: var(--text-dim);
  cursor: pointer;

function toggleSection(id) {
  const hdr = document.getElementById('hdr_'+id);
  const items = document.getElementById('items_'+id);
  hdr.classList.toggle('collapsed');
  items.classList.toggle('collapsed');
}

function setActiveSidebarItem(alertId) {
  document.querySelectorAll('.sidebar-item').forEach(el => el.classList.remove('active'));
  const el = document.getElementById('si_'+alertId);
  if (el) {
    el.classList.add('active');
    el.scrollIntoView({block:'nearest'});
  }
}

// ============================================================
// NAV
// ============================================================
function navHome() {
  document.querySelectorAll('.sidebar-item').forEach(el => el.classList.remove('active'));
  document.getElementById('main-home').classList.add('active');
  document.getElementById('main-chapter').classList.remove('active');
  document.getElementById('main-search').classList.remove('active');
  document.getElementById('main-home').scrollIntoView();
  document.getElementById('mainContent').scrollTop = 0;
}

function showChapter(code) {
  const ch = chapters.find(c => c.code === code);
  if (!ch) return;
  const chAlerts = alerts.filter(a => a.chapter === code);
  
  const content = document.getElementById('main-chapter');
  content.innerHTML = `
    <div class="detail-page">
      <div class="detail-back" onclick="navHome()">← BACK TO HOME</div>
      <div class="detail-header">
        <div class="detail-me-tag">${ch.code}</div>
        <div>
          <div class="detail-title">${ch.title}</div>
          <div class="detail-sub">${chAlerts.length} ALERT(S) — SELECT FROM SIDEBAR</div>
        </div>
      </div>
      <div class="alert-grid">
        ${chAlerts.map(a => renderAlertCard(a)).join('')}
      </div>
    </div>
  `;
  
  document.getElementById('main-home').classList.remove('active');
  document.getElementById('main-chapter').classList.add('active');
  document.getElementById('main-search').classList.remove('active');
  document.getElementById('mainContent').scrollTop = 0;
}

function showAlert(alertId, fromSearch) {
  const a = alerts.find(x => x.id === alertId);
  if (!a) return;
  setActiveSidebarItem(alertId);
  const ch = chapters.find(c => c.code === a.chapter);
  const content = document.getElementById('main-chapter');
  content.innerHTML = '<div class="detail-page">'
    + '<div class="detail-back" onclick="navHome()">← BACK TO HOME</div>'
    + '<div class="detail-header">'
    + '<div class="detail-me-tag">' + a.chapter + '</div>'
    + '<div><div class="detail-title">' + (ch ? ch.title : a.chapter) + '</div>'
    + '<div class="detail-sub">' + a.name + '</div></div></div>'
    + '<div class="alert-grid" id="alertGrid_' + a.chapter + '"></div></div>';
  document.getElementById('main-home').classList.remove('active');
  document.getElementById('main-chapter').classList.add('active');
  document.getElementById('main-search').classList.remove('active');
  document.getElementById('mainContent').scrollTop = 0;
  document.getElementById('alertGrid_' + a.chapter).innerHTML = renderAlertCard(a);
  const card = document.getElementById('card_' + alertId);
  if (card) card.classList.add('open');
}

// ============================================================
// ALERT CARD RENDER
// ============================================================
function renderAlertCard(a) {
  const hasCB = a.cb && a.cb.length > 0;
  
  let cbHtml = '';
  if (hasCB) {
    let grouped = {};
    a.cb.forEach(c => {
      if (!grouped[c.panel]) grouped[c.panel] = [];
      grouped[c.panel].push(c);
    });
    
    cbHtml = `<table class="cb-table"><thead><tr><th>PANEL</th><th>DESIGNATION</th><th>FIN</th><th>LOC</th></tr></thead><tbody>`;
    Object.keys(grouped).forEach(panel => {
      grouped[panel].forEach(c => {
        cbHtml += `<tr><td>${panel}</td><td>${c.des}</td><td>${c.fin}</td><td>${c.loc}</td></tr>`;
      });
    });
    cbHtml += `</tbody></table>`;
  } else {
    cbHtml = `<div class="no-cb">N/A</div>`;
  }

  const fcomText = a.fcom ? a.fcom.replace(/\n/g,'<br>') : 'Refer FCOM';
  const testText = a.test ? a.test.replace(/\n/g,'<br>') : 'Refer TSM';
  
  const melHtml = a.mel ? renderMelSection(a.mel) : '';
  return '<div class="alert-card" id="card_' + a.id + '">'
    + '<div class="alert-card-header" onclick="toggleCard(\''+a.id+'\')"><div class="alert-name">' + a.name + '</div><div class="alert-chevron">▶</div></div>'
    + '<div class="alert-body">'
    + '<div class="info-section"><div class="info-section-label">FCOM — TRIGGER CONDITION</div><div class="fcom-box">' + fcomText + '</div></div>'
    + '<div class="info-section"><div class="info-section-label">CIRCUIT BREAKERS</div>' + cbHtml + '</div>'
    + '<div class="info-section"><div class="info-section-label">TEST / BITE</div><div class="test-box">' + testText + '</div></div>'
    + (a.reset ? '<div class="info-section"><div class="info-section-label" style="color:var(--amber)">RESET PROCEDURE</div><div class="reset-box">' + a.reset.replace(/\n/g,'<br>') + '</div></div>' : '')
    + (a.eon ? '<div class="info-section"><div class="info-section-label" style="color:var(--red)">⚠ EON / TFU</div><div class="eon-box">' + a.eon.replace(/\n/g,'<br>') + '</div></div>' : '')
    + melHtml
    + '</div></div>';
}

function toggleCard(alertId) {
  const card = document.getElementById('card_'+alertId);
  if (card) card.classList.toggle('open');
}

function openCard(alertId) {
  const card = document.getElementById('card_'+alertId);
  if (card) card.classList.add('open');
}

// SEARCH
// ============================================================
document.getElementById('searchInput').addEventListener('input', function() {
  const q = this.value.trim().toLowerCase();
  if (q.length < 2) {
    if (currentPage !== 'home' && currentPage !== 'chapter') navHome();
    return;
  }
  doSearch(q);
});

function doSearch(q) {
  const results = alerts.filter(a => 
    a.name.toLowerCase().includes(q) ||
    (a.fcom && a.fcom.toLowerCase().includes(q)) ||
    (a.eon && a.eon.toLowerCase().includes(q)) ||
    (a.reset && a.reset.toLowerCase().includes(q))
  );

  const searchDiv = document.getElementById('main-search');
  const chMap = {};
  chapters.forEach(c => chMap[c.code] = c.title);

  if (results.length === 0) {
    searchDiv.innerHTML = `<div class="search-empty">NO RESULTS FOR "${q.toUpperCase()}"</div>`;
  } else {
    searchDiv.innerHTML = `
      <div style="font-family:'Share Tech Mono',monospace;font-size:10px;color:var(--text-dim);padding:10px 14px;letter-spacing:2px;border-bottom:1px solid var(--border);">
        ${results.length} RESULT(S) FOR "${q.toUpperCase()}"
      </div>
      ${results.map(a => `
        <div class="search-result-item" onclick="showAlert('${a.id}', true)">
          <div style="flex:1">
            <div class="res-name">${a.name}</div>
            <div class="res-chapter">${a.chapter} — ${chMap[a.chapter]||'Other'}</div>
          </div>
          <div class="res-badge">${a.chapter}</div>
        </div>
      `).join('')}
    `;
  }

  document.getElementById('main-home').classList.remove('active');
  document.getElementById('main-chapter').classList.remove('active');
  document.getElementById('main-search').classList.add('active');
}

(function initFontCtrl() {
  var BASE = 14;
  var cur = parseFloat(localStorage.getItem('fontSizePx') || BASE);
  var pressTimer = null;
  var pressInterval = null;

  function applySize(px) {
    px = Math.min(40, Math.max(8, Math.round(px)));
    cur = px;
    var scale = px / BASE;
    document.documentElement.style.setProperty('--ui-scale', scale.toFixed(3));
    var inp = document.getElementById('fontSizeInput');
    if (inp) inp.value = px;
    localStorage.setItem('fontSizePx', px);
  }

  function startPress(dir) {
    applySize(cur + dir);
    pressTimer = setTimeout(function() {
      pressInterval = setInterval(function() { applySize(cur + dir); }, 80);
    }, 400);
  }
  function stopPress() {
    clearTimeout(pressTimer);
    clearInterval(pressInterval);
    pressTimer = pressInterval = null;
  }

  function bindBtn(id, dir) {
    var btn = document.getElementById(id);
    if (!btn) return;
    btn.addEventListener('mousedown',  function(e){ e.preventDefault(); startPress(dir); });
    btn.addEventListener('touchstart', function(e){ e.preventDefault(); startPress(dir); }, {passive:false});
    ['mouseup','mouseleave','touchend','touchcancel'].forEach(function(ev){
      btn.addEventListener(ev, stopPress);
    });
  }

  window.addEventListener('DOMContentLoaded', function() {
    applySize(cur);
    bindBtn('fontUpBtn',   1);
    bindBtn('fontDownBtn', -1);
    var inp = document.getElementById('fontSizeInput');
    if (inp) {
      inp.addEventListener('change', function(){ applySize(parseFloat(this.value)||BASE); });
      inp.addEventListener('keydown', function(e){
        if (e.key==='ArrowUp')   { e.preventDefault(); applySize(cur+1); }
        if (e.key==='ArrowDown') { e.preventDefault(); applySize(cur-1); }
      });
    }
  });
})();

// ────────────────────────────────────────────────────────────
// PINCH-TO-ZOOM for Overview SVG
// ────────────────────────────────────────────────────────────
(function initOverviewZoom() {
  var scale = 1, minScale = 0.5, maxScale = 5;
  var offsetX = 0, offsetY = 0;
  var lastTouchDist = null;
  var lastTouchMidX = 0, lastTouchMidY = 0;
  var isDragging = false, dragStartX = 0, dragStartY = 0, dragStartOX = 0, dragStartOY = 0;

  function getWrap() { return document.getElementById('cbOverviewSvgWrap'); }
  function getInner() { return document.getElementById('cbOverviewSvgInner'); }

  function applyTransform() {
    var inner = getInner();
    if (!inner) return;
    inner.style.transform = 'translate(' + offsetX + 'px,' + offsetY + 'px) scale(' + scale + ')';
    var pct = document.getElementById('overviewZoomPct');
    if (pct) pct.textContent = Math.round(scale * 100) + '%';
  }

  function clampOffset() {
    var wrap = getWrap();
    if (!wrap) return;
    var ww = wrap.clientWidth, wh = wrap.clientHeight;
    var inner = getInner();
    if (!inner) return;
    var iw = inner.scrollWidth * scale, ih = inner.scrollHeight * scale;
    var maxX = Math.max(0, (iw - ww) / 2);
    var maxY = Math.max(0, (ih - wh) / 2);
    offsetX = Math.max(-maxX, Math.min(maxX, offsetX));
    offsetY = Math.max(-maxY, Math.min(maxY, offsetY));
  }

  function getTouchDist(t) {
    var dx = t[0].clientX - t[1].clientX, dy = t[0].clientY - t[1].clientY;
    return Math.sqrt(dx*dx + dy*dy);
  }
  function getTouchMid(t) {
    return { x: (t[0].clientX + t[1].clientX) / 2, y: (t[0].clientY + t[1].clientY) / 2 };
  }

  function setupWrap(wrap) {
    if (!wrap || wrap._zoomBound) return;
    wrap._zoomBound = true;

    // Touch: pinch & pan
    wrap.addEventListener('touchstart', function(e) {
      if (e.touches.length === 2) {
        e.preventDefault();
        lastTouchDist = getTouchDist(e.touches);
        var mid = getTouchMid(e.touches);
        lastTouchMidX = mid.x; lastTouchMidY = mid.y;
      } else if (e.touches.length === 1) {
        isDragging = true;
        dragStartX = e.touches[0].clientX; dragStartY = e.touches[0].clientY;
        dragStartOX = offsetX; dragStartOY = offsetY;
      }
    }, { passive: false });

    wrap.addEventListener('touchmove', function(e) {
      if (e.touches.length === 2) {
        e.preventDefault();
        var newDist = getTouchDist(e.touches);
        var mid = getTouchMid(e.touches);
        if (lastTouchDist) {
          var factor = newDist / lastTouchDist;
          var newScale = Math.min(maxScale, Math.max(minScale, scale * factor));
          // Zoom toward midpoint
          var rect = wrap.getBoundingClientRect();
          var mx = mid.x - rect.left - wrap.clientWidth / 2;
          var my = mid.y - rect.top - wrap.clientHeight / 2;
          offsetX += (mx - offsetX) * (1 - factor);
          offsetY += (my - offsetY) * (1 - factor);
          scale = newScale;
          // Pan by mid movement
          offsetX += (mid.x - lastTouchMidX);
          offsetY += (mid.y - lastTouchMidY);
        }
        lastTouchDist = newDist;
        lastTouchMidX = mid.x; lastTouchMidY = mid.y;
        clampOffset();
        applyTransform();
      } else if (e.touches.length === 1 && isDragging) {
        e.preventDefault();
        offsetX = dragStartOX + (e.touches[0].clientX - dragStartX);
        offsetY = dragStartOY + (e.touches[0].clientY - dragStartY);
        clampOffset();
        applyTransform();
      }
    }, { passive: false });

    wrap.addEventListener('touchend', function(e) {
      if (e.touches.length < 2) lastTouchDist = null;
      if (e.touches.length === 0) isDragging = false;
    });

    // Mouse wheel zoom
    wrap.addEventListener('wheel', function(e) {
      e.preventDefault();
      var factor = e.deltaY < 0 ? 1.12 : 0.89;
      var newScale = Math.min(maxScale, Math.max(minScale, scale * factor));
      var rect = wrap.getBoundingClientRect();
      var mx = e.clientX - rect.left - wrap.clientWidth / 2;
      var my = e.clientY - rect.top - wrap.clientHeight / 2;
      offsetX += (mx - offsetX) * (1 - factor);
      offsetY += (my - offsetY) * (1 - factor);
      scale = newScale;
      clampOffset();
      applyTransform();
    }, { passive: false });

    // Mouse drag pan
    wrap.addEventListener('mousedown', function(e) {
      if (e.button !== 0) return;
      isDragging = true;
      dragStartX = e.clientX; dragStartY = e.clientY;
      dragStartOX = offsetX; dragStartOY = offsetY;
      e.preventDefault();
    });
    document.addEventListener('mousemove', function(e) {
      if (!isDragging) return;
      var wrap2 = getWrap();
      if (!wrap2 || !wrap2._zoomBound) return;
      offsetX = dragStartOX + (e.clientX - dragStartX);
      offsetY = dragStartOY + (e.clientY - dragStartY);
      clampOffset();
      applyTransform();
    });
    document.addEventListener('mouseup', function() { isDragging = false; });

    // Double tap/click to reset
    var lastTap = 0;
    wrap.addEventListener('touchend', function(e) {
      var now = Date.now();
      if (now - lastTap < 300) { overviewZoomReset(); }
      lastTap = now;
    });
    wrap.addEventListener('dblclick', function() { overviewZoomReset(); });
  }

  // Watch for the wrap element to appear in DOM (since content is rendered dynamically)
  var observer = new MutationObserver(function() {
    var wrap = getWrap();
    if (wrap) { setupWrap(wrap); }
  });
  observer.observe(document.body, { childList: true, subtree: true });

  window.overviewZoom = function(factor) {
    var wrap = getWrap();
    if (!wrap) return;
    scale = Math.min(maxScale, Math.max(minScale, scale * factor));
    clampOffset();
    applyTransform();
  };

  window.overviewZoomReset = function() {
    scale = 1; offsetX = 0; offsetY = 0;
    applyTransform();
  };

  window._overviewGetScale = function() { return scale; };
})();

function _ovGetW(){ return document.getElementById('cbOverviewSvgWrap'); }
function _ovGetI(){ return document.getElementById('cbOverviewSvgInner'); }

function _ovApply(){
  var i=_ovGetI(); if(!i) return;
  i.style.transform='translate('+_ovX.toFixed(1)+'px,'+_ovY.toFixed(1)+'px) scale('+_ovS+')';
  var l=document.getElementById('overviewZoomPct');
  if(l) l.textContent=Math.round(_ovS*100)+'%';
}

function overviewZoom(f){
  _ovS=Math.min(_ovMAX,Math.max(_ovMIN,_ovS*f)); _ovApply();
}
function overviewZoomReset(){ _ovS=1;_ovX=0;_ovY=0; _ovApply(); }

function _ovSetup(w){
  if(!w||w._ovReady) return;
  w._ovReady=true;

  // Touch: pinch-zoom + single-finger pan
  w.addEventListener('touchstart',function(e){
    if(e.touches.length===2){
      e.preventDefault();
      var dx=e.touches[0].clientX-e.touches[1].clientX;
      var dy=e.touches[0].clientY-e.touches[1].clientY;
      _ovPinch=Math.sqrt(dx*dx+dy*dy);
      _ovPMX=(e.touches[0].clientX+e.touches[1].clientX)/2;
      _ovPMY=(e.touches[0].clientY+e.touches[1].clientY)/2;
    } else if(e.touches.length===1){
      _ovDrag=true;
      _ovDX=e.touches[0].clientX; _ovDY=e.touches[0].clientY;
      _ovDOX=_ovX; _ovDOY=_ovY;
    }
  },{passive:false});

  w.addEventListener('touchmove',function(e){
    e.preventDefault();
    if(e.touches.length===2 && _ovPinch!==null){
      var dx=e.touches[0].clientX-e.touches[1].clientX;
      var dy=e.touches[0].clientY-e.touches[1].clientY;
      var nd=Math.sqrt(dx*dx+dy*dy);
      var mx=(e.touches[0].clientX+e.touches[1].clientX)/2;
      var my=(e.touches[0].clientY+e.touches[1].clientY)/2;
      var f=nd/_ovPinch;
      var ns=Math.min(_ovMAX,Math.max(_ovMIN,_ovS*f));
      var r=w.getBoundingClientRect();
      var px=mx-r.left, py=my-r.top;
      // Scale toward pinch midpoint, then pan by midpoint movement
      _ovX = px-(px-_ovX)*(ns/_ovS) + (mx-_ovPMX);
      _ovY = py-(py-_ovY)*(ns/_ovS) + (my-_ovPMY);
      _ovS=ns; _ovPinch=nd; _ovPMX=mx; _ovPMY=my;
      _ovApply();
    } else if(e.touches.length===1 && _ovDrag){
      _ovX=_ovDOX+(e.touches[0].clientX-_ovDX);
      _ovY=_ovDOY+(e.touches[0].clientY-_ovDY);
      _ovApply();
    }
  },{passive:false});

  w.addEventListener('touchend',function(e){
    if(e.touches.length<2) _ovPinch=null;
    if(e.touches.length===0){
      _ovDrag=false;
      var n=Date.now();
      if(n-_ovTap<300) overviewZoomReset();
      _ovTap=n;
    }
  });

  // Mouse wheel zoom
  w.addEventListener('wheel',function(e){
    e.preventDefault();
    var f=e.deltaY<0?1.12:0.89;
    var ns=Math.min(_ovMAX,Math.max(_ovMIN,_ovS*f));
    var r=w.getBoundingClientRect();
    var px=e.clientX-r.left, py=e.clientY-r.top;
    _ovX=px-(px-_ovX)*(ns/_ovS); _ovY=py-(py-_ovY)*(ns/_ovS);
    _ovS=ns; _ovApply();
  },{passive:false});

  // Mouse drag pan
  w.addEventListener('mousedown',function(e){
    if(e.button!==0) return;
    _ovDrag=true; w.style.cursor='grabbing';
    _ovDX=e.clientX; _ovDY=e.clientY; _ovDOX=_ovX; _ovDOY=_ovY;
    e.preventDefault();
  });
  document.addEventListener('mousemove',function(e){
    if(!_ovDrag) return;
    var ww=_ovGetW(); if(!ww||!ww._ovReady) return;
    _ovX=_ovDOX+(e.clientX-_ovDX); _ovY=_ovDOY+(e.clientY-_ovDY);
    _ovApply();
  });
  document.addEventListener('mouseup',function(){
    if(_ovDrag){ _ovDrag=false; var w=_ovGetW(); if(w) w.style.cursor='grab'; }
  });
  w.addEventListener('dblclick',overviewZoomReset);
}

// Watch for the wrap div to appear (content is rendered dynamically)
var _ovObs=new MutationObserver(function(){
  var w=_ovGetW(); if(w&&!w._ovReady) _ovSetup(w);
});
window.addEventListener('DOMContentLoaded',function(){
  _ovObs.observe(document.body,{childList:true,subtree:true});
  // Also try immediately in case already rendered
  var w=_ovGetW(); if(w) _ovSetup(w);
});


// ── Fuzzy Search Preview Panel ───────────────────────────────
var _spResults=[], _spSelected=0;

function openSearchPreview(){
  var panel=document.getElementById('searchPreview');
  var inp=document.getElementById('searchPreviewInput');
  panel.classList.add('active');
  setTimeout(function(){ inp.focus(); },50);
  var cur=document.getElementById('searchInput').value;
  if(cur){ inp.value=cur; spSearch(cur); }
  inp.oninput=function(){ spSearch(this.value); };
  inp.onkeydown=function(e){
    if(e.key==='ArrowDown'){e.preventDefault();spNavigate(1);}
    else if(e.key==='ArrowUp'){e.preventDefault();spNavigate(-1);}
    else if(e.key==='Enter'){e.preventDefault();spGotoCurrent();}
    else if(e.key==='Escape'){closeSearchPreview();}
  };
}

function closeSearchPreview(){
  document.getElementById('searchPreview').classList.remove('active');
}

function spSearch(q){
  q=q.trim();
  var resultDiv=document.getElementById('searchPreviewResults');
  var countEl=document.getElementById('spCount');
  if(!q){ resultDiv.innerHTML=''; countEl.textContent=''; _spResults=[]; return; }
  
  var qLow=q.toLowerCase();
  var words=qLow.split(/\s+/).filter(Boolean);
  
  // Score each alert
  var scored=[];
  alerts.forEach(function(a){
    var nameLow=a.name.toLowerCase();
    var fcomLow=(a.fcom||'').toLowerCase();
    var melCod=a.mel?(a.mel.conditionOfDispatch||'').toLowerCase():'';
    var melTitle=a.mel?(a.mel.itemTitle||'').toLowerCase():'';
    
    // Exact substring in name = highest score
    var score=0;
    if(nameLow.includes(qLow)) score+=100;
    words.forEach(function(w){
      if(nameLow.includes(w)) score+=20;
      if(fcomLow.includes(w)) score+=5;
      if(melCod.includes(w))  score+=3;
      if(melTitle.includes(w)) score+=3;
    });
    if(score>0) scored.push({alert:a, score:score});
  });
  
  scored.sort(function(a,b){ return b.score-a.score; });
  _spResults=scored.slice(0,50);
  _spSelected=0;
  
  if(_spResults.length===0){
    resultDiv.innerHTML='<div style="padding:20px;text-align:center;font-family:Share Tech Mono,monospace;font-size:12px;color:var(--text-dim);">沒有符合的結果</div>';
    countEl.textContent='';
    return;
  }
  
  countEl.textContent=_spResults.length+(_spResults.length===50?'+':'')+' 筆結果';
  spRenderResults(q);
}

function spHighlight(text, q){
  if(!q||!text) return text||'';
  var words=q.toLowerCase().split(/\s+/).filter(Boolean);
  var result=text;
  words.forEach(function(w){
    if(!w) return;
    var re=new RegExp('('+w.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')','gi');
    result=result.replace(re,'<span class="sp-highlight">$1</span>');
  });
  return result;
}

function spRenderResults(q){
  var resultDiv=document.getElementById('searchPreviewResults');
  var html='';
  _spResults.forEach(function(r,i){
    var a=r.alert;
    var cls='sp-item'+(i===_spSelected?' sp-selected':'');
    var melBadge=a.mel?'<div class="sp-item-mel">MEL: '+(a.mel.conditionOfDispatch==='NO DISPATCH'?
      '⛔ NO DISPATCH':'✓ '+a.mel.conditionOfDispatch.substring(0,60))+'</div>':'';
    html+='<div class="'+cls+'" data-idx="'+i+'" onclick="spSelect('+i+')">'
      +'<div class="sp-item-ch">'+a.chapter+'</div>'
      +'<div class="sp-item-name">'+spHighlight(a.name,q)+'</div>'
      +(a.fcom&&a.fcom!=='Refer FCOM'?'<div class="sp-item-desc">'+spHighlight(a.fcom.substring(0,120),q)+'</div>':'')
      +melBadge
      +'</div>';
  });
  resultDiv.innerHTML=html;
  spScrollToSelected();
}

function spSelect(idx){
  _spSelected=idx;
  var items=document.querySelectorAll('.sp-item');
  items.forEach(function(el,i){ el.classList.toggle('sp-selected',i===idx); });
  spScrollToSelected();
}

function spNavigate(dir){
  if(!_spResults.length) return;
  _spSelected=Math.max(0,Math.min(_spResults.length-1,_spSelected+dir));
  spSelect(_spSelected);
}

function spScrollToSelected(){
  var el=document.querySelector('.sp-item.sp-selected');
  if(el) el.scrollIntoView({block:'nearest',behavior:'smooth'});
}

function spGotoCurrent(){
  if(!_spResults.length) return;
  var a=_spResults[_spSelected].alert;
  closeSearchPreview();
  document.getElementById('searchInput').value=a.name;
  showAlert(a.id);
}

// Keyboard shortcut: / to open search
document.addEventListener('keydown',function(e){
  if(e.key==='/'&&!e.ctrlKey&&!e.metaKey&&
     document.activeElement.tagName!=='INPUT'){
    e.preventDefault(); openSearchPreview();
  }
});


function openLightbox(src, title) {
  var lb = document.getElementById('lightbox');
  var img = document.getElementById('lightboxImg');
  var ttl = document.getElementById('lightboxTitle');
  img.src = src;
  ttl.textContent = title || '';
  lb.classList.add('active');
  document.body.style.overflow = 'hidden';
}
function closeLightbox(e) {
  // Close if clicking backdrop (not the image itself)
  if (e && e.target && e.target.id === 'lightboxImg') return;
  var lb = document.getElementById('lightbox');
  lb.classList.remove('active');
  document.body.style.overflow = '';
}
document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') closeLightbox();
});


function showNoDispatch() {
  document.querySelectorAll('.sidebar-item').forEach(function(el){ el.classList.remove('active'); });
  
  var byChapter = {};
  var CH_ORDER = ["ME-21", "ME-22", "ME-23", "ME-24", "ME-26", "ME-27", "ME-28", "ME-29", "ME-30", "ME-31", "ME-32", "ME-34", "ME-36", "ME-46", "ME-47", "ME-49", "ME-52", "ME-70", "OTHER"];
  noDispatchAlerts.forEach(function(a){
    if(!byChapter[a.chapter]) byChapter[a.chapter] = [];
    byChapter[a.chapter].push(a);
  });
  
  var CH_NAMES = {
    'ME-21':'Air Conditioning','ME-22':'Auto Flight','ME-23':'Communications',
    'ME-24':'Electrical Power','ME-26':'Fire Protection','ME-27':'Flight Controls',
    'ME-28':'Fuel','ME-29':'Hydraulic Power','ME-30':'Ice and Rain Protection',
    'ME-31':'Indicating/Recording','ME-32':'Landing Gear','ME-34':'Navigation',
    'ME-36':'Pneumatic','ME-46':'Information Systems','ME-47':'Inert Gas',
    'ME-49':'APU','ME-52':'Doors','ME-70':'Engine','OTHER':'Others'
  };
  
  var body = '';
  CH_ORDER.forEach(function(ch){
    var items = byChapter[ch];
    if(!items || !items.length) return;
    var chNum = ch.replace('ME-','').replace('OTHER','特殊');
    body += '<div class="nd-chapter">'
      + '<div class="nd-ch-header">' + chNum + '章 — ' + (CH_NAMES[ch]||ch)
      + ' <span class="nd-ch-count">' + items.length + '</span></div>';
    items.forEach(function(a){
      body += '<div class="nd-item" onclick="showAlert(\'' + a.id + '\')">'
        + '<span class="nd-icon">⛔</span>'
        + '<span class="nd-name">' + a.name + '</span>'
        + '</div>';
    });
    body += '</div>';
  });
  
  document.getElementById('main-chapter').innerHTML =
    '<div class="detail-page">'
    + '<div class="detail-back" onclick="navHome()">← BACK TO HOME</div>'
    + '<div class="detail-header">'
    + '<div class="detail-me-tag" style="background:rgba(240,96,96,0.2);color:#f06060;border-color:#f06060;">⛔</div>'
    + '<div><div class="detail-title">NO DISPATCH</div>'
    + '<div class="detail-sub">181 條毛病不允許放行 — 依章節排序</div>'
    + '</div></div>'
    + body + '</div>';
  
  document.getElementById('main-home').classList.remove('active');
  document.getElementById('main-chapter').classList.add('active');
  document.getElementById('main-search').classList.remove('active');
  document.getElementById('mainContent').scrollTop = 0;
}
