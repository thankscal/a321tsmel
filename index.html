<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A321neo 病急亂投醫 — ECAM Quick Reference</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;500;600;700&family=Noto+Sans+TC:wght@300;400;500;700&display=swap');

:root {
  --bg:#0a0c0f;--panel:#0f1317;--panel2:#141820;--border:#1e2530;--border-bright:#2a3545;
  --amber:#f5a623;--amber-dim:#8a5d12;--green:#39d353;--green-dim:#1a5c28;--red:#e05252;
  --blue:#4db8ff;--blue-dim:#1a4060;--text:#c8d4e0;--text-dim:#5a6a7a;--text-bright:#eaf2ff;
  --accent:#f5a623;--warning-bg:#1a1200;--caution-bg:#0a1520;
  --mel-bg:#0d1520;--mel-border:#1e3050;
}
body.day-mode {
  --bg:#f0f2f5;--panel:#ffffff;--panel2:#f5f7fa;--border:#d0d8e4;--border-bright:#b0bcd0;
  --amber:#c47800;--amber-dim:#e8b040;--green:#1a7a30;--green-dim:#2aa048;--red:#c03030;
  --blue:#1a6ab8;--blue-dim:#5090d0;--text:#2a3a4a;--text-dim:#7a8a9a;--text-bright:#0a1828;
  --accent:#c47800;--warning-bg:#fff8e0;--caution-bg:#e8f2ff;--mel-bg:#eef4ff;--mel-border:#b0c8e8;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Noto Sans TC', 'Rajdhani', sans-serif;
  min-height: 100vh;
  overflow-x: hidden;
}

/* SCANLINE OVERLAY */
body::before {
  content: '';
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: repeating-linear-gradient(
    0deg,
    transparent,
    transparent 2px,
    rgba(0,0,0,0.07) 2px,
    rgba(0,0,0,0.07) 4px
  );
  pointer-events: none;
  z-index: 9999;
}

/* TOP HEADER */
.header {
  background: var(--panel);
  border-bottom: 1px solid var(--border-bright);
  padding: 12px 20px;
  display: flex;
  align-items: center;
  gap: 16px; flex-wrap:wrap;
  position: sticky; top: 0; z-index: 100;
}

.header-logo {
  font-family: 'Share Tech Mono', monospace;
  font-size: 11px;
  color: var(--amber);
  letter-spacing: 2px;
  text-transform: uppercase;
  white-space: nowrap;
}

.header-title {
  font-family: 'Rajdhani', sans-serif;
  font-weight: 700;
  font-size: 20px;
  color: var(--text-bright);
  letter-spacing: 3px;
  text-transform: uppercase;
}

.header-sub {
  font-family: 'Share Tech Mono', monospace;
  font-size: 10px;
  color: var(--text-dim);
  letter-spacing: 1px;
  flex: 1;
}

.warning-badge {
  background: var(--warning-bg);
  border: 1px solid var(--amber-dim);
  color: var(--amber);
  font-family: 'Share Tech Mono', monospace;
  font-size: 9px;
  padding: 4px 8px;
  letter-spacing: 1px;
  animation: blink 3s ease-in-out infinite;
}

@keyframes blink {
  0%, 90%, 100% { opacity: 1; }
  95% { opacity: 0.3; }
}

/* SEARCH BAR */
.search-bar {
  padding: 12px 20px;
  background: var(--panel);
  border-bottom: 1px solid var(--border);
  display: flex;
  gap: 10px;
  align-items: center;
}

.search-input {
  flex: 1;
  background: var(--bg);
  border: 1px solid var(--border-bright);
  color: var(--text-bright);
  font-family: 'Share Tech Mono', monospace;
  font-size: 13px;
  padding: 8px 12px;
  outline: none;
  letter-spacing: 1px;
  transition: border-color 0.2s;
}

.search-input::placeholder { color: var(--text-dim); }
.search-input:focus { border-color: var(--amber); }

.search-label {
  font-family: 'Share Tech Mono', monospace;
  font-size: 10px;
  color: var(--amber);
  letter-spacing: 2px;
}

/* LAYOUT */
.layout{display:flex;min-height:calc(100vh - 100px);}
.resizer{width:6px;background:var(--border);cursor:col-resize;flex-shrink:0;transition:background 0.15s;}
.resizer:hover,.resizer.dragging{background:var(--amber);}

/* SIDEBAR */
.sidebar{background:var(--panel);border-right:1px solid var(--border);overflow-y:auto;height:calc(100vh - 100px);position:sticky;top:100px;width:260px;min-width:140px;max-width:480px;flex-shrink:0;}

.sidebar-section {
  border-bottom: 1px solid var(--border);
}

.sidebar-section-header {
  padding: 10px 14px;
  font-family: 'Share Tech Mono', monospace;
  font-size: 9px;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--amber);
  background: rgba(245,166,35,0.05);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: space-between;
  user-select: none;
  transition: background 0.15s;
}

.sidebar-section-header:hover { background: rgba(245,166,35,0.1); }

.sidebar-section-header .arrow {
  transition: transform 0.2s;
  font-size: 8px;
}

.sidebar-section-header.collapsed .arrow { transform: rotate(-90deg); }

.sidebar-items {
  overflow: hidden;
  transition: max-height 0.3s ease;
}

.sidebar-items.collapsed { max-height: 0; }

.sidebar-item {
  padding:8px 14px 8px 22px;
  font-size:14px;
  color: var(--text-dim);
  cursor: pointer;
  transition: all 0.15s;
  display: flex;
  align-items: center;
  gap: 8px;
  border-left: 2px solid transparent;
  font-family: 'Noto Sans TC', sans-serif;
  letter-spacing: 0.3px;
}

.sidebar-item:hover {
  color: var(--text-bright);
  background: rgba(77,184,255,0.05);
  border-left-color: var(--blue);
}

.sidebar-item.active {
  color: var(--amber);
  background: rgba(245,166,35,0.08);
  border-left-color: var(--amber);
}

.sidebar-item .dot {
  width: 4px; height: 4px;
  border-radius: 50%;
  background: currentColor;
  flex-shrink: 0;
}

/* MAIN CONTENT */
.main{overflow-y:auto;padding:20px;background:var(--bg);flex:1;min-width:0;}

/* HOME PAGE */
.home-page {
  max-width: 900px;
}

.home-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap: 1px;
  background: var(--border);
  margin-bottom: 20px;
}

.chapter-card {
  background: var(--panel);
  padding: 16px;
  cursor: pointer;
  transition: all 0.15s;
  position: relative;
  overflow: hidden;
}

.chapter-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0;
  width: 3px; height: 100%;
  background: var(--amber-dim);
  transition: background 0.15s;
}

.chapter-card:hover {
  background: var(--panel2);
}
.chapter-card:hover::before { background: var(--amber); }

.chapter-card .me-code {
  font-family: 'Share Tech Mono', monospace;
  font-size: 11px;
  color: var(--amber);
  letter-spacing: 2px;
  margin-bottom: 6px;
}

.chapter-card .me-title {
  font-size: 13px;
  color: var(--text);
  font-weight: 500;
  line-height: 1.3;
}

.chapter-card .me-count {
  margin-top: 8px;
  font-family: 'Share Tech Mono', monospace;
  font-size: 10px;
  color: var(--text-dim);
}

/* AIRCRAFT INFO */
.ac-info-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
  gap: 12px;
  margin-bottom: 20px;
}

.ac-card {
  background: var(--panel);
  border: 1px solid var(--border);
  padding: 12px 16px;
}

.ac-card-label {
  font-family: 'Share Tech Mono', monospace;
  font-size: 9px;
  color: var(--text-dim);
  letter-spacing: 2px;
  margin-bottom: 8px;
  text-transform: uppercase;
}

.ac-table {
  width: 100%;
  font-size: 12px;
}

.ac-table tr td:first-child {
  color: var(--text-dim);
  font-family: 'Share Tech Mono', monospace;
  font-size: 11px;
  padding-right: 12px;
  width: 80px;
  letter-spacing: 0.5px;
}

.ac-table tr td:last-child {
  color: var(--green);
  font-family: 'Share Tech Mono', monospace;
  font-size: 11px;
}

.ac-table tr { border-bottom: 1px solid var(--border); }
.ac-table tr:last-child { border: none; }
.ac-table tr td { padding: 5px 0; }

/* DETAIL PAGE */
.detail-page {}

.detail-back {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  font-family: 'Share Tech Mono', monospace;
  font-size: 11px;
  color: var(--text-dim);
  cursor: pointer;
  margin-bottom: 16px;
  transition: color 0.15s;
  letter-spacing: 1px;
}
.detail-back:hover { color: var(--amber); }

.detail-header {
  display: flex;
  align-items: flex-start;
  gap: 16px;
  margin-bottom: 20px;
  padding-bottom: 16px;
  border-bottom: 1px solid var(--border);
}

.detail-me-tag {
  background: var(--warning-bg);
  border: 1px solid var(--amber-dim);
  font-family: 'Share Tech Mono', monospace;
  font-size: 10px;
  color: var(--amber);
  padding: 4px 8px;
  letter-spacing: 2px;
  white-space: nowrap;
  flex-shrink: 0;
}

.detail-title {
  font-family: 'Rajdhani', sans-serif;
  font-size: 22px;
  font-weight: 700;
  color: var(--text-bright);
  letter-spacing: 2px;
  text-transform: uppercase;
  line-height: 1.2;
}

.detail-sub {
  font-size: 12px;
  color: var(--text-dim);
  font-family: 'Share Tech Mono', monospace;
  margin-top: 4px;
  letter-spacing: 1px;
}

/* ALERT CARDS */
.alert-grid {
  display: grid;
  gap: 1px;
  background: var(--border);
}

.alert-card {
  background: var(--panel);
  transition: background 0.15s;
}

.alert-card-header {
  padding: 12px 16px;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 12px;
  transition: background 0.15s;
}

.alert-card-header:hover { background: var(--panel2); }

.alert-name {
  font-family: 'Share Tech Mono', monospace;
  font-size:15px;
  color:var(--amber);
  letter-spacing:1.5px;
  flex: 1;
}

.alert-chevron {
  color: var(--text-dim);
  font-size: 10px;
  transition: transform 0.2s;
  flex-shrink: 0;
}

.alert-card.open .alert-chevron { transform: rotate(90deg); }

.alert-body {
  display: none;
  padding: 0 16px 16px;
  background: var(--panel2);
  border-top: 1px solid var(--border);
}

.alert-card.open .alert-body { display: block; }

/* SECTIONS INSIDE ALERT */
.info-section {
  margin-top: 14px;
}

.info-section-label {
  font-family: 'Share Tech Mono', monospace;
  font-size: 9px;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--blue);
  margin-bottom: 8px;
  display: flex;
  align-items: center;
  gap: 8px;
}

.info-section-label::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--border-bright);
}

.fcom-box {
  background:var(--caution-bg);
  border-left:3px solid var(--blue-dim);
  padding:10px 12px;
  font-size:14px;
  color: var(--text);
  line-height: 1.7;
  font-family: 'Noto Sans TC', sans-serif;
}

.cb-table {
  width: 100%;
  border-collapse: collapse;
  font-family: 'Share Tech Mono', monospace;
  font-size: 11px;
}

.cb-table th {
  background: rgba(245,166,35,0.08);
  color: var(--amber);
  font-size: 9px;
  letter-spacing: 2px;
  text-align: left;
  padding: 6px 10px;
  text-transform: uppercase;
  border-bottom: 1px solid var(--amber-dim);
}

.cb-table td {
  padding: 5px 10px;
  border-bottom: 1px solid var(--border);
  color: var(--text);
}

.cb-table td:first-child { color: var(--amber); }
.cb-table td:nth-child(3) { color: var(--green); }
.cb-table td:last-child { color: var(--blue); font-weight: 700; }

.cb-table tr:hover td { background: rgba(77,184,255,0.04); }

.cb-group-header {
  background: rgba(0,0,0,0.3);
  color: var(--text-dim);
  font-size: 9px;
  letter-spacing: 2px;
  padding: 4px 10px;
  text-transform: uppercase;
  font-style: italic;
}

.test-box {
  background: rgba(57,211,83,0.05);
  border-left: 3px solid var(--green-dim);
  padding: 10px 12px;
  font-size:13px;
  color:var(--text);
  line-height:1.7;
  font-family:'Share Tech Mono', monospace;
  letter-spacing: 0.3px;
}

.eon-box {
  background: rgba(224,82,82,0.05);
  border-left: 3px solid var(--red);
  padding: 10px 12px;
  font-size:13px;
  color:var(--text);
  line-height:1.7;
  font-family:'Noto Sans TC', sans-serif;
}

.reset-box {
  background: rgba(77,184,255,0.05);
  border-left: 3px solid var(--blue-dim);
  border-top: 1px solid var(--border);
  border-right: 1px solid var(--border);
  border-bottom: 1px solid var(--border);
  padding: 10px 12px;
  font-size:13px;
  color:var(--text);
  line-height:1.9;
  font-family:'Share Tech Mono', monospace;
  letter-spacing: 0.5px;
}

.reset-box strong {
  color: var(--blue);
  font-weight: 600;
}

/* STATUS BAR */
.status-bar {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  background: var(--panel);
  border-top: 1px solid var(--border);
  padding: 4px 20px;
  display: flex;
  gap: 20px;
  font-family: 'Share Tech Mono', monospace;
  font-size: 10px;
  color: var(--text-dim);
  letter-spacing: 1px;
  z-index: 100;
}

.status-item { display: flex; align-items: center; gap: 6px; }
.status-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--green);
  animation: pulse 2s ease-in-out infinite;
}

@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.3; }
}

/* SEARCH RESULTS */
.search-result-item {
  padding: 10px 14px;
  border-bottom: 1px solid var(--border);
  cursor: pointer;
  transition: background 0.15s;
  display: flex;
  align-items: center;
  gap: 10px;
}
.search-result-item:hover { background: var(--panel2); }
.search-result-item .res-name {
  font-family: 'Share Tech Mono', monospace;
  font-size: 12px;
  color: var(--amber);
  letter-spacing: 1px;
}
.search-result-item .res-chapter {
  font-size: 11px;
  color: var(--text-dim);
  margin-top: 2px;
  font-family: 'Noto Sans TC', sans-serif;
}
.res-badge {
  font-family: 'Share Tech Mono', monospace;
  font-size: 9px;
  background: rgba(245,166,35,0.1);
  border: 1px solid var(--amber-dim);
  color: var(--amber);
  padding: 2px 6px;
  letter-spacing: 1px;
  flex-shrink: 0;
}

.page { display: none; }
.page.active { display: block; }

/* WATER LEVEL TABLE */
.water-table {
  border-collapse: collapse;
  font-family: 'Share Tech Mono', monospace;
  font-size: 12px;
}
.water-table td { padding: 6px 16px; border: 1px solid var(--border); }
.water-table td:first-child { color: var(--amber); }
.water-table td:last-child { color: var(--green); }

/* HIGHLIGHT */
.highlight { color: var(--amber); font-weight: 600; }

/* Scrollbar */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--border-bright); }
::-webkit-scrollbar-thumb:hover { background: var(--amber-dim); }

.no-cb {
  font-family: 'Share Tech Mono', monospace;
  font-size: 11px;
  color: var(--text-dim);
  font-style: italic;
  padding: 6px 0;
}

.tag-warning {
  display: inline-block;
  background: rgba(224,82,82,0.12);
  border: 1px solid var(--red);
  color: var(--red);
  font-family: 'Share Tech Mono', monospace;
  font-size: 9px;
  padding: 2px 6px;
  letter-spacing: 1px;
  margin-right: 4px;
}

.search-empty {
  padding: 40px;
  text-align: center;
  font-family: 'Share Tech Mono', monospace;
  font-size: 12px;
  color: var(--text-dim);
  letter-spacing: 2px;
}

.mel-section{margin-top:14px;border:1px solid var(--mel-border);background:var(--mel-bg);}
.mel-section-title{font-family:'Share Tech Mono',monospace;font-size:11px;letter-spacing:3px;text-transform:uppercase;color:var(--blue);padding:8px 12px;background:rgba(77,184,255,0.08);border-bottom:1px solid var(--mel-border);display:flex;align-items:center;gap:8px;}
.mel-section-title::after{content:'';flex:1;height:1px;background:var(--mel-border);}
.mel-entries-box{padding:10px 12px;border-bottom:1px solid var(--mel-border);}
.mel-entries-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.mel-entries-col-header{font-family:'Share Tech Mono',monospace;font-size:10px;letter-spacing:2px;color:var(--amber);text-transform:uppercase;padding-bottom:4px;border-bottom:1px solid var(--mel-border);margin-bottom:6px;}
.mel-entries-val{font-size:13px;color:var(--text);font-family:'Noto Sans TC',sans-serif;line-height:1.6;}
.mel-item-box{padding:10px 12px;}
.mel-item-header{font-family:'Share Tech Mono',monospace;font-size:14px;color:var(--amber);letter-spacing:1px;font-weight:700;margin-bottom:3px;}
.mel-item-ident{font-family:'Share Tech Mono',monospace;font-size:10px;color:var(--text-dim);margin-bottom:10px;}
.mel-sub-item{border:1px solid var(--mel-border);margin-bottom:10px;background:var(--panel);}
.mel-sub-item-header{background:rgba(245,166,35,0.07);padding:6px 10px;font-family:'Share Tech Mono',monospace;font-size:12px;color:var(--amber);letter-spacing:1px;border-bottom:1px solid var(--mel-border);}
.mel-dispatch-table{width:100%;border-collapse:collapse;font-family:'Share Tech Mono',monospace;font-size:12px;margin-bottom:8px;}
.mel-dispatch-table th{background:rgba(77,184,255,0.05);color:var(--blue);font-size:10px;letter-spacing:1.5px;text-align:center;padding:5px 8px;border:1px solid var(--mel-border);text-transform:uppercase;}
.mel-dispatch-table td{text-align:center;padding:5px 8px;border:1px solid var(--mel-border);color:var(--text-bright);}
.mel-dispatch-table td.interval{color:var(--amber);font-weight:700;font-size:15px;}
.mel-conditions{padding:8px 10px;font-size:13px;color:var(--text);font-family:'Noto Sans TC',sans-serif;line-height:1.8;}
.mel-conditions .cond-item{display:block;margin-bottom:3px;}
.mel-note{font-size:12px;color:var(--amber);background:rgba(245,166,35,0.06);border-left:3px solid var(--amber-dim);padding:5px 10px;margin-top:6px;}
.mel-ref-line{font-family:'Share Tech Mono',monospace;font-size:11px;color:var(--text-dim);padding:4px 10px;border-top:1px solid var(--mel-border);background:rgba(0,0,0,0.1);}
.mel-ref-line span{color:var(--blue);}
.day-toggle{font-family:'Share Tech Mono',monospace;font-size:11px;background:rgba(77,184,255,0.1);border:1px solid var(--border-bright);color:var(--blue);padding:5px 12px;cursor:pointer;letter-spacing:1px;transition:all 0.2s;white-space:nowrap;margin-left:auto;}
.day-toggle:hover{background:rgba(77,184,255,0.2);border-color:var(--blue);}
</style>
</head>
<body>

<div class="header">
  <div>
    <div class="header-logo">▶ A321NEO / PW1133G-JM</div>
    <div class="header-title">病急亂投醫</div>
  </div>
  <div class="header-sub">ECAM QUICK REFERENCE  ·  REV.1  ·  20230208</div>
  <div class="warning-badge">⚠ NOT FOR MAINTENANCE USE</div>
  <button class="day-toggle" id="dayToggleBtn" onclick="toggleDayMode()">☀ DAY MODE</button>
</div>

<div class="search-bar">
  <span class="search-label">SEARCH:</span>
  <input type="text" class="search-input" id="searchInput" placeholder="輸入ECAM訊息 e.g. FADEC, BRAKES, ENG..." autocomplete="off">
</div>

<div class="layout">
  <div class="sidebar" id="sidebar">
    <!-- Sidebar built by JS -->
  </div>
  <div class="resizer" id="resizer"></div>
  <div class="main" id="mainContent">
    <!-- Pages built by JS -->
  </div>
</div>

<div class="status-bar">
  <div class="status-item"><div class="status-dot"></div>SYSTEM NORMAL</div>
  <div class="status-item">MSN: 10730~10736</div>
  <div class="status-item">STD: ST8</div>
  <div class="status-item">THIS IS NOT A MAINTENANCE MANUAL</div>
</div>

<script>
// ============================================================
// DATA
// ============================================================
const chapters = [
  { code: "ME-21", title: "Air Conditioning" },
  { code: "ME-22", title: "Auto Flight" },
  { code: "ME-23", title: "Communications" },
  { code: "ME-24", title: "Electrical Power" },
  { code: "ME-26", title: "Fire Protection" },
  { code: "ME-27", title: "Flight Controls" },
  { code: "ME-28", title: "Fuel" },
  { code: "ME-29", title: "Hydraulic Power" },
  { code: "ME-30", title: "Ice and Rain Protection" },
  { code: "ME-31", title: "Indicating/Recording Systems" },
  { code: "ME-32", title: "Landing Gear" },
  { code: "ME-34", title: "Navigation" },
  { code: "ME-36", title: "Pneumatic" },
  { code: "ME-46", title: "Information Systems" },

let currentPage = 'home';

// ============================================================
// RENDER SIDEBAR
// ============================================================
function renderSidebar() {
  const sidebar = document.getElementById('sidebar');
  
  let html = `
    <div class="sidebar-section">
      <div class="sidebar-section-header" onclick="navHome()">
        <span>▣ HOME / AIRCRAFT INFO</span>
      </div>
    </div>
  `;

  chapters.forEach(ch => {
    const chAlerts = alerts.filter(a => a.chapter === ch.code);
    const id = ch.code.replace(/[^a-zA-Z0-9]/g,'_');
    html += `
      <div class="sidebar-section">
        <div class="sidebar-section-header" id="hdr_${id}" onclick="toggleSection('${id}')">
          <span>${ch.code} ${ch.title}</span>
          <span class="arrow">▾</span>
        </div>
        <div class="sidebar-items" id="items_${id}">
          ${chAlerts.map(a => `
            <div class="sidebar-item" id="si_${a.id}" onclick="showAlert('${a.id}')">
              <span class="dot"></span>
              <span>${a.name}</span>
            </div>
          `).join('')}
        </div>
      </div>
    `;
  });

  sidebar.innerHTML = html;
}

function toggleSection(id) {
  const hdr = document.getElementById('hdr_'+id);
  const items = document.getElementById('items_'+id);
  hdr.classList.toggle('collapsed');
  items.classList.toggle('collapsed');
}

function setActiveSidebarItem(alertId) {
  document.querySelectorAll('.sidebar-item').forEach(el => el.classList.remove('active'));
  const el = document.getElementById('si_'+alertId);
  if (el) {
    el.classList.add('active');
    el.scrollIntoView({block:'nearest'});
  }
}

// ============================================================
// NAV
// ============================================================
function navHome() {
  document.querySelectorAll('.sidebar-item').forEach(el => el.classList.remove('active'));
  document.getElementById('main-home').classList.add('active');
  document.getElementById('main-chapter').classList.remove('active');
  document.getElementById('main-search').classList.remove('active');
  document.getElementById('main-home').scrollIntoView();
  document.getElementById('mainContent').scrollTop = 0;
}

function showChapter(code) {
  const ch = chapters.find(c => c.code === code);
  if (!ch) return;
  const chAlerts = alerts.filter(a => a.chapter === code);
  
  const content = document.getElementById('main-chapter');
  content.innerHTML = `
    <div class="detail-page">
      <div class="detail-back" onclick="navHome()">← BACK TO HOME</div>
      <div class="detail-header">
        <div class="detail-me-tag">${ch.code}</div>
        <div>
          <div class="detail-title">${ch.title}</div>
          <div class="detail-sub">${chAlerts.length} ALERT(S) — SELECT FROM SIDEBAR</div>
        </div>
      </div>
      <div class="alert-grid">
        ${chAlerts.map(a => renderAlertCard(a)).join('')}
      </div>
    </div>
  `;
  
  document.getElementById('main-home').classList.remove('active');
  document.getElementById('main-chapter').classList.add('active');
  document.getElementById('main-search').classList.remove('active');
  document.getElementById('mainContent').scrollTop = 0;
}

function showAlert(alertId, fromSearch) {
  const a = alerts.find(x => x.id === alertId);
  if (!a) return;
  setActiveSidebarItem(alertId);
  const ch = chapters.find(c => c.code === a.chapter);
  const content = document.getElementById('main-chapter');
  content.innerHTML = '<div class="detail-page">'
    + '<div class="detail-back" onclick="navHome()">← BACK TO HOME</div>'
    + '<div class="detail-header">'
    + '<div class="detail-me-tag">' + a.chapter + '</div>'
    + '<div><div class="detail-title">' + (ch ? ch.title : a.chapter) + '</div>'
    + '<div class="detail-sub">' + a.name + '</div></div></div>'
    + '<div class="alert-grid" id="alertGrid_' + a.chapter + '"></div></div>';
  document.getElementById('main-home').classList.remove('active');
  document.getElementById('main-chapter').classList.add('active');
  document.getElementById('main-search').classList.remove('active');
  document.getElementById('mainContent').scrollTop = 0;
  document.getElementById('alertGrid_' + a.chapter).innerHTML = renderAlertCard(a);
  const card = document.getElementById('card_' + alertId);
  if (card) card.classList.add('open');
}

// ============================================================
// ALERT CARD RENDER
// ============================================================
function renderAlertCard(a) {
  const hasCB = a.cb && a.cb.length > 0;
  
  let cbHtml = '';
  if (hasCB) {
    let grouped = {};
    a.cb.forEach(c => {
      if (!grouped[c.panel]) grouped[c.panel] = [];
      grouped[c.panel].push(c);
    });
    
    cbHtml = `<table class="cb-table"><thead><tr><th>PANEL</th><th>DESIGNATION</th><th>FIN</th><th>LOC</th></tr></thead><tbody>`;
    Object.keys(grouped).forEach(panel => {
      grouped[panel].forEach(c => {
        cbHtml += `<tr><td>${panel}</td><td>${c.des}</td><td>${c.fin}</td><td>${c.loc}</td></tr>`;
      });
    });
    cbHtml += `</tbody></table>`;
  } else {
    cbHtml = `<div class="no-cb">N/A</div>`;
  }

  const fcomText = a.fcom ? a.fcom.replace(/\n/g,'<br>') : 'Refer FCOM';
  const testText = a.test ? a.test.replace(/\n/g,'<br>') : 'Refer TSM';
  
  const melHtml = a.mel ? renderMelSection(a.mel) : '';
  return '<div class="alert-card" id="card_' + a.id + '">'
    + '<div class="alert-card-header" onclick="toggleCard(\''+a.id+'\')"><div class="alert-name">' + a.name + '</div><div class="alert-chevron">▶</div></div>'
    + '<div class="alert-body">'
    + '<div class="info-section"><div class="info-section-label">FCOM — TRIGGER CONDITION</div><div class="fcom-box">' + fcomText + '</div></div>'
    + '<div class="info-section"><div class="info-section-label">CIRCUIT BREAKERS</div>' + cbHtml + '</div>'
    + '<div class="info-section"><div class="info-section-label">TEST / BITE</div><div class="test-box">' + testText + '</div></div>'
    + (a.reset ? '<div class="info-section"><div class="info-section-label" style="color:var(--amber)">RESET PROCEDURE</div><div class="reset-box">' + a.reset.replace(/\n/g,'<br>') + '</div></div>' : '')
    + (a.eon ? '<div class="info-section"><div class="info-section-label" style="color:var(--red)">⚠ EON / TFU</div><div class="eon-box">' + a.eon.replace(/\n/g,'<br>') + '</div></div>' : '')
    + melHtml
    + '</div></div>';
}

function toggleCard(alertId) {
  const card = document.getElementById('card_'+alertId);
  if (card) card.classList.toggle('open');
}

function openCard(alertId) {
  const card = document.getElementById('card_'+alertId);
  if (card) card.classList.add('open');
}

// ============================================================
// SEARCH
// ============================================================
document.getElementById('searchInput').addEventListener('input', function() {
  const q = this.value.trim().toLowerCase();
  if (q.length < 2) {
    if (currentPage !== 'home' && currentPage !== 'chapter') navHome();
    return;
  }
  doSearch(q);
});

function doSearch(q) {
  const results = alerts.filter(a => 
    a.name.toLowerCase().includes(q) ||
    (a.fcom && a.fcom.toLowerCase().includes(q)) ||
    (a.eon && a.eon.toLowerCase().includes(q)) ||
    (a.reset && a.reset.toLowerCase().includes(q))
  );

  const searchDiv = document.getElementById('main-search');
  const chMap = {};
  chapters.forEach(c => chMap[c.code] = c.title);

  if (results.length === 0) {
    searchDiv.innerHTML = `<div class="search-empty">NO RESULTS FOR "${q.toUpperCase()}"</div>`;
  } else {
    searchDiv.innerHTML = `
      <div style="font-family:'Share Tech Mono',monospace;font-size:10px;color:var(--text-dim);padding:10px 14px;letter-spacing:2px;border-bottom:1px solid var(--border);">
        ${results.length} RESULT(S) FOR "${q.toUpperCase()}"
      </div>
      ${results.map(a => `
        <div class="search-result-item" onclick="showAlert('${a.id}', true)">
          <div style="flex:1">
            <div class="res-name">${a.name}</div>
            <div class="res-chapter">${a.chapter} — ${chMap[a.chapter]||'Other'}</div>
          </div>
          <div class="res-badge">${a.chapter}</div>
        </div>
      `).join('')}
    `;
  }

  document.getElementById('main-home').classList.remove('active');
  document.getElementById('main-chapter').classList.remove('active');
  document.getElementById('main-search').classList.add('active');
}

    <div id="main-home" class="page active">${renderHome()}</div>
    <div id="main-chapter" class="page"></div>
    <div id="main-search" class="page"></div>
  `;
  
  // Collapse all sidebar sections by default except first few
  chapters.forEach((ch, i) => {
    const id = ch.code.replace(/[^a-zA-Z0-9]/g,'_');

      const hdr = document.getElementById('hdr_'+id);
      const items = document.getElementById('items_'+id);
      if (hdr && items) {
        hdr.classList.add('collapsed');
        items.classList.add('collapsed');
      }
    }
  });
}


function renderMelSection(mel) {
  const subItems = mel.items.map(function(item) {
    const refsHtml = item.refs && item.refs.length ? item.refs.map(function(r){ return '<div class="mel-ref-line"><span>('+r.type+')</span> '+r.text+'</div>'; }).join('') : '';
    return '<div class="mel-sub-item">'
      +'<div class="mel-sub-item-header">'+item.code+(item.title?' — '+item.title:'')+'</div>'
      +'<div class="mel-item-box">'
      +'<table class="mel-dispatch-table"><thead><tr><th>REPAIR INTERVAL</th><th>NBR INSTALLED</th><th>NBR REQUIRED</th><th>PLACARD</th></tr></thead>'

      +'<div class="mel-conditions">'+item.conditions+'</div>'
      +(item.note ? '<div class="mel-note">NOTE: '+item.note+'</div>' : '')
      +refsHtml+'</div></div>';
  }).join('');
  return '<div class="info-section">'
    +'<div class="info-section-label" style="color:var(--blue)">&#128203; MEL REFERENCE</div>'
    +'<div class="mel-section">'
    +'<div class="mel-section-title">MEL ENTRIES — AIRCRAFT STATUS &amp; CONDITION OF DISPATCH</div>'

    +'<div><div class="mel-entries-col-header">CONDITION OF DISPATCH</div><div class="mel-entries-val">'+mel.conditionOfDispatch+'</div></div>'
    +'</div></div>'
    +'<div class="mel-section-title">MEL ITEMS — <span style="color:var(--amber)">'+mel.itemRef+'</span></div>'
    +'<div class="mel-item-box" style="padding-bottom:4px;">'
    +'<div class="mel-item-header">'+mel.itemRef+' — '+mel.itemTitle+'</div>'
    +'<div class="mel-item-ident">Ident.: '+mel.ident+' | Applicable to: '+mel.applicable+'</div>'
    +'</div>'+subItems+'</div></div>';
}

(function initResizer(){
  var resizer=document.getElementById('resizer');
  var sidebar=document.getElementById('sidebar');
  if(!resizer||!sidebar) return;
  var startX,startW,dragging=false;
  function onStart(x){dragging=true;startX=x;startW=sidebar.offsetWidth;resizer.classList.add('dragging');document.body.style.userSelect='none';document.body.style.cursor='col-resize';}
  function onMove(x){if(!dragging)return;sidebar.style.width=Math.min(480,Math.max(140,startW+(x-startX)))+'px';}
  function onEnd(){if(!dragging)return;dragging=false;resizer.classList.remove('dragging');document.body.style.userSelect='';document.body.style.cursor='';localStorage.setItem('sidebarWidth',sidebar.offsetWidth);}
  resizer.addEventListener('mousedown',function(e){onStart(e.clientX);});
  document.addEventListener('mousemove',function(e){onMove(e.clientX);});
  document.addEventListener('mouseup',onEnd);
  resizer.addEventListener('touchstart',function(e){onStart(e.touches[0].clientX);},{passive:true});
  document.addEventListener('touchmove',function(e){onMove(e.touches[0].clientX);},{passive:true});
  document.addEventListener('touchend',onEnd);
  var saved=localStorage.getItem('sidebarWidth');
  if(saved) sidebar.style.width=parseInt(saved)+'px';
})();

}
